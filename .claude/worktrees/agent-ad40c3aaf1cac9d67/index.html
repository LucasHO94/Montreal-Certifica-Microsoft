<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Simulador de Certificações Microsoft — AZ-900, PL-200, AI-900, PL-300, DP-600, DP-700, DP-750" />
    <title>Simulador de Certificações Microsoft</title>
  </head>
  <body>
    <script>
      var redirect = sessionStorage.getItem('spaRedirect');
      if (redirect && redirect !== '/certificacoes-microsoft/') {
        sessionStorage.removeItem('spaRedirect');
        window.history.replaceState(null, null, redirect);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
